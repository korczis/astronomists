<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Astronautisté">
  <defs>
    <radialGradient id="bg" cx="72%" cy="22%" r="90%">
      <stop offset="0%" stop-color="#15233f"/>
      <stop offset="55%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9c9"/>
      <stop offset="45%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#a97c4c"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a574" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- orbit -->
  <ellipse cx="256" cy="256" rx="168" ry="92" fill="none" stroke="#d4a574" stroke-opacity="0.32"
           stroke-width="6" transform="rotate(-26 256 256)"/>
  <!-- glow halo around core -->
  <circle cx="256" cy="256" r="120" fill="url(#glow)"/>
  <!-- luminous core (Pale Blue Dot motif, gold) -->
  <circle cx="256" cy="256" r="46" fill="url(#core)"/>
  <!-- signal-red satellite on orbit -->
  <circle cx="389" cy="186" r="17" fill="#e63946"/>
</svg>
