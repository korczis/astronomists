name: Build · check · deploy (Zola + Flowbite → gh-pages)

on:
  push:
    branches: [master]
  schedule:
    # 🇨🇿 Pravidelný redeploy (týdně, pondělí 06:17 UTC) — i bez pushe.
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Zola
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2
        with:
          tool: zola@0.22.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Build (Tailwind/Flowbite → Zola → zola check)
        run: bash scripts/build.sh

      - name: Coverage assert
        run: bash scripts/check.sh "$GITHUB_WORKSPACE/public"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E smoke (Playwright)
        run: npx playwright test --project=chromium --project=mobile-chrome

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload built site
        uses: actions/upload-artifact@v4
        with:
          name: public
          path: public/
          retention-days: 1

  deploy:
    needs: build-check
    runs-on: ubuntu-latest
    steps:
      - name: Download built site
        uses: actions/download-artifact@v4
        with:
          name: public
          path: public

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          cname: astronautiste.cz
          force_orphan: true
