{% if pg_title == config.title %}
  {% set full_title = config.title %}
{% else %}
  {% set full_title = pg_title ~ " · " ~ config.title %}
{% endif %}
{% set og_image_abs = config.base_url ~ config.extra.og_image %}
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>{{ full_title }}</title>
  <meta name="description" content="{{ pg_desc }}">
  <meta name="author" content="Astronautisté">

  <!-- Color / theme -->
  <meta name="color-scheme" content="dark light">
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#f8f8f8" media="(prefers-color-scheme: light)">
  <meta name="format-detection" content="telephone=no">

  <link rel="canonical" href="{{ pg_url | safe }}">

  <!-- Icons & manifest -->
  <link rel="icon" href="/favicon.ico" sizes="32x32">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="author" href="/humans.txt">

  <!-- Open Graph (Facebook, LinkedIn, WhatsApp, Telegram, Slack, Discord, iMessage) -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Astronautisté">
  <meta property="og:title" content="{{ full_title }}">
  <meta property="og:description" content="{{ pg_desc }}">
  <meta property="og:url" content="{{ pg_url | safe }}">
  <meta property="og:locale" content="cs_CZ">
  <meta property="og:image" content="{{ og_image_abs }}">
  <meta property="og:image:secure_url" content="{{ og_image_abs }}">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="{{ config.extra.og_image_alt }}">

  <!-- Twitter / X Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ full_title }}">
  <meta name="twitter:description" content="{{ pg_desc }}">
  <meta name="twitter:image" content="{{ og_image_abs }}">
  <meta name="twitter:image:alt" content="{{ config.extra.og_image_alt }}">

  <!-- Structured data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "Organization",
        "@id": "{{ config.base_url }}/#organization",
        "name": "Astronautisté",
        "url": "{{ config.base_url }}/",
        "logo": {
          "@type": "ImageObject",
          "url": "{{ config.base_url }}/icon-512.png",
          "width": 512,
          "height": 512
        },
        "image": "{{ og_image_abs }}",
        "description": "{{ config.description }}",
        "slogan": "{{ config.extra.tagline_cs }}",
        "sameAs": ["{{ config.extra.repo_url }}"]
      },
      {
        "@type": "WebSite",
        "@id": "{{ config.base_url }}/#website",
        "url": "{{ config.base_url }}/",
        "name": "Astronautisté",
        "description": "{{ config.description }}",
        "inLanguage": "cs-CZ",
        "publisher": { "@id": "{{ config.base_url }}/#organization" }
      }
    ]
  }
  </script>

  <!-- Fonts + styles -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
